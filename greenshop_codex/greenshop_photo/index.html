<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenShop - Your Garden Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">🌿 GreenShop</div>
            <nav class="nav">
                <input type="text" class="search-input" id="searchInput" placeholder="Search plants...">
                <div class="nav-links">
                    <a href="#home">Home</a>
                    <a href="#products">Products</a>
                    <a href="#about">About</a>
                    <a href="#contact">Contact</a>
                </div>
                <div class="cart-icon">
                    <span>🛒</span>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to GreenShop</h1>
            <p>Discover the finest selection of plants for your home and garden</p>
            <button class="btn btn-primary">Shop Now</button>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="filters">
        <div class="container">
            <h2>Find Your Perfect Plant</h2>
            <div class="filter-group">
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="indoor">Indoor Plants</option>
                    <option value="outdoor">Outdoor Plants</option>
                    <option value="flowers">Flowers</option>
                    <option value="succulents">Succulents</option>
                </select>

                <select id="priceFilter" class="filter-select">
                    <option value="">All Prices</option>
                    <option value="0-50">$0 - $50</option>
                    <option value="50-100">$50 - $100</option>
                    <option value="100-200">$100 - $200</option>
                    <option value="200+">$200+</option>
                </select>

                <input type="number" id="minPrice" class="filter-input" placeholder="Min Price" min="0">
                <input type="number" id="maxPrice" class="filter-input" placeholder="Max Price" min="0">
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <section class="products" id="products">
        <div class="container">
            <h2>Featured Products</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Products will be dynamically generated here -->
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total">
                <h3>Total: $<span id="totalPrice">0</span></h3>
            </div>
            <button class="btn btn-primary btn-checkout">Checkout</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 GreenShop. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
